<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>室内定位服务</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #18202a;
      --muted: #667085;
      --border: #d9e0e8;
      --primary: #1f6feb;
      --good: #16794c;
      --warn: #b54708;
      --bad: #b42318;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; background: var(--bg); color: var(--text); font-family: Arial, "Microsoft YaHei", sans-serif; }
    h1 { margin: 0; font-size: 22px; font-weight: 650; }
    .subtitle { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .wrap { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 16px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06); }
    .section-title { margin: 0 0 12px 0; font-size: 15px; font-weight: 650; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px; margin-bottom: 12px; }
    label { color: var(--muted); font-size: 13px; }
    input, select { height: 34px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--text); }
    button { height: 38px; padding: 0 16px; border: 1px solid var(--border); border-radius: 9px; background: #fff; color: var(--text); cursor: pointer; font-size: 14px; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .metric { color: var(--muted); font-size: 13px; }
    .metric strong { color: var(--text); font-weight: 600; }
    .ok { color: var(--good); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    video, canvas.preview { width: 100%; border-radius: 10px; background: #111827; }
    .preview-wrap { max-width: 420px; }
    .map-stage { position: relative; width: 100%; max-height: 70vh; overflow: hidden; border: 1px solid var(--border); border-radius: 12px; background: #eef1f5; }
    .map-stage img.map-image { display: block; width: 100%; height: auto; max-height: 70vh; object-fit: contain; }
    .map-stage canvas.map-overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .summary { min-height: 92px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: #fafbfc; color: var(--text); font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    @media (min-width: 980px) {
      .wrap { grid-template-columns: 420px 1fr; }
      .map-stage { max-height: 82vh; }
      .map-stage img.map-image { max-height: 82vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>室内定位服务</h1>
    <div class="subtitle">ALIKED + LightGlue 视觉定位，输出楼层平面图坐标。</div>
  </header>

  <div class="wrap">
    <section class="card">
      <div class="section-title">定位输入</div>
      <div class="row">
        <button id="startBtn" class="primary">开始定位</button>
        <button id="stopBtn">停止</button>
      </div>
      <div class="row">
        <label>请求间隔
          <input id="intervalMs" type="number" min="300" max="5000" step="100" value="900" style="width:86px;"> ms
        </label>
        <label>上传宽度
          <select id="captureWidth">
            <option value="1280">1280</option>
            <option value="1920" selected>1920</option>
            <option value="auto-max">自动</option>
          </select>
        </label>
      </div>
      <div class="row">
        <label>JPEG
          <input id="jpegQuality" type="number" min="0.6" max="0.98" step="0.02" value="0.90" style="width:72px;">
        </label>
        <label>模式
          <select id="qualityPreset">
            <option value="fast">快速</option>
            <option value="balanced" selected>均衡</option>
            <option value="quality">高质量</option>
          </select>
        </label>
      </div>
      <div class="preview-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="shot" class="preview" width="640" height="480" style="display:none;"></canvas>
      </div>
      <div class="section-title" style="margin-top:14px;">结果摘要</div>
      <div class="summary" id="resultBox">等待定位。</div>
    </section>

    <section class="card">
      <div class="section-title">楼层平面图</div>
      <div class="row metric">
        <span>状态：<strong id="statusText">初始化</strong></span>
        <span>定位：<strong id="successText">-</strong></span>
        <span>置信度：<strong id="confText">-</strong></span>
      </div>
      <div class="row metric">
        <span>服务：<strong id="engineText">-</strong></span>
        <span>耗时：<strong id="durationText">-</strong></span>
        <span>跳过帧：<strong id="busyText">0</strong></span>
      </div>
      <div class="row metric">
        <span>视频流：<strong id="streamResolutionText">-</strong></span>
        <span>上传图像：<strong id="captureResolutionText">-</strong></span>
      </div>
      <div class="row metric">
        <span>清晰度：<strong id="sharpnessText">-</strong></span>
        <span>候选分数：<strong id="burstScoresText">-</strong></span>
        <span>选帧：<strong id="selectedFrameText">-</strong></span>
      </div>
      <div class="map-stage" id="mapStage">
        <img id="mapImage" class="map-image" alt="floorplan">
        <canvas id="mapOverlay" class="map-overlay" width="1200" height="900"></canvas>
      </div>
    </section>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
